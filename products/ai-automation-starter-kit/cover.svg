<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#ffffff" stroke-width="2">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="34" fill="#22d3ee" font-weight="700" letter-spacing="6">NO CODE · NO EXPENSIVE TOOLS</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="92" fill="#ffffff" font-weight="800">AI Automation</text>
  <text x="80" y="455" font-family="Arial, sans-serif" font-size="92" fill="url(#accent)" font-weight="800">Starter Kit</text>
  <text x="80" y="540" font-family="Arial, sans-serif" font-size="36" fill="#cbd5e1">10 copy-paste automations that save you hours every week</text>
  <g transform="translate(80,600)">
    <rect width="290" height="64" rx="32" fill="url(#accent)"/>
    <text x="145" y="42" font-family="Arial, sans-serif" font-size="30" fill="#0f172a" font-weight="800" text-anchor="middle">For Freelancers &amp; SMBs</text>
  </g>
  <g transform="translate(1000,250)" opacity="0.9">
    <circle cx="80" cy="80" r="80" fill="none" stroke="#22d3ee" stroke-width="6"/>
    <text x="80" y="100" font-family="Arial, sans-serif" font-size="70" fill="#ffffff" font-weight="800" text-anchor="middle">10</text>
    <text x="80" y="210" font-family="Arial, sans-serif" font-size="28" fill="#cbd5e1" text-anchor="middle">blueprints</text>
  </g>
</svg>
